<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>地震マップ</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- アイコンレール -->
<nav id="rail">
    <div id="rail-tabs">
        <button class="rail-btn active" data-panel="monitor" title="強震モニタ">
            <i class="fa-solid fa-wave-square"></i>
            <span class="rail-badge" id="monitor-eew-badge" style="display:none"></span>
        </button>

        <button class="rail-btn" data-panel="eqinfo" title="地震情報">
            <i class="fa-solid fa-circle-dot"></i>
        </button>
        <button class="rail-btn" data-panel="tsunami" title="津波情報">
            <i class="fa-solid fa-water"></i>
        </button>
    </div>

    <div id="rail-bottom">
        <button class="rail-btn" data-panel="sim" title="過去データ再生">
            <i class="fa-solid fa-clock-rotate-left"></i>
        </button>
        <button class="rail-btn" data-panel="settings" title="設定">
            <i class="fa-solid fa-gear"></i>
        </button>
    </div>
</nav>

<!-- スライドパネル -->
<div id="slide-panel">

    <!-- 強震モニタ -->
    <div class="panel" id="panel-monitor">
        <div class="panel-header">強震モニタ</div>

        <!-- EEW (発令中のみ表示) -->
        <div id="eew-section" style="display:none">
            <div class="eew-alert-header">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span>緊急地震速報（警報）</span>
                <span id="eew-serial" class="eew-serial-badge">第--報</span>
            </div>
            <div class="eew-alert-body">
                <div class="int-badge int-none" id="eew-int-badge">−</div>
                <div class="eew-info">
                    <div class="eew-name" id="eew-name">--</div>
                    <div class="eew-detail" id="eew-detail">M--  深さ--</div>
                    <div class="eew-time" id="eew-time">--:--:--</div>
                </div>
            </div>
        </div>

        <div class="panel-section" style="margin-top:auto">
            <div class="sec-label">現在の最大震度</div>
            <div class="intensity-row">
                <div class="int-badge int-none" id="max-int-badge">−</div>
                <div>
                    <div class="int-value" id="max-int-value">計測値  −−</div>
                    <div class="int-point" id="max-int-point">−−</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 過去データ再生 -->
    <div class="panel" id="panel-sim">
        <div class="panel-header">過去データ再生</div>
        <div class="panel-section">
            <input type="file" id="sim-video-upload" accept="video/*" style="width: 100%; margin-bottom: 8px; font-size: 12px; color: var(--text-hi);">
            <video id="sim-video" src="ダウンロード.mp4" controls width="100%" muted style="border-radius: 4px; border: 1px solid var(--border-hi);"></video>

            <div id="sim-adjust-wrap" style="transition: all 0.2s; background: var(--bg-panel); border-radius: 4px;">
                <div class="sec-label" style="margin-top:10px; display: flex; justify-content: space-between;">
                    <span>プレビュー (クリックで拡大・縮小)</span>
                </div>
                <div id="sim-preview-wrap" style="position: relative; width: 100%; border: 1px solid #f87171; border-radius: 4px; overflow: hidden; background: #000; aspect-ratio: 352/400; cursor: pointer;">
                    <canvas id="sim-preview-canvas" width="352" height="400" style="width: 100%; height: 100%; display: block;"></canvas>
                    <img src="20260506204841.gif" onerror="this.style.display='none'" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; animation: simBlink 1.5s infinite alternate;">
                    <style>
                        @keyframes simBlink {
                            0% { opacity: 0; }
                            100% { opacity: 0.8; }
                        }
                    </style>
                </div>

                <div class="sec-label" style="margin-top:10px;">トリミング調整 (X, Y, W, H)</div>
                <div style="display:flex; gap: 4px; margin-top: 4px;">
                    <input type="number" step="0.1" id="sim-crop-x" class="sim-input" value="124" placeholder="X">
                    <input type="number" step="0.1" id="sim-crop-y" class="sim-input" value="-1" placeholder="Y">
                    <input type="number" step="0.1" id="sim-crop-w" class="sim-input" value="352" placeholder="W">
                    <input type="number" step="0.1" id="sim-crop-h" class="sim-input" value="400" placeholder="H">
                </div>

                <div style="margin-top: 10px; display: flex; align-items: center; gap: 8px;">
                    <label style="font-size: 11px; color: var(--text-hi); display: flex; align-items: center; gap: 4px; cursor: pointer;">
                        <input type="checkbox" id="sim-debug-toggle"> 判定ポイントを可視化（デバッグ）
                    </label>
                </div>
            </div>

            <div class="sim-row" style="margin-top: 10px; display: flex; flex-direction: column; gap: 8px;">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 11px; color: var(--text-dim); white-space: nowrap;">再生速度:</span>
                    <select id="sim-speed-select" style="flex: 1; background: var(--bg-card); color: var(--text-hi); border: 1px solid var(--border-hi); border-radius: 4px; padding: 2px;">
                        <option value="0.2">0.2x (1fps相当)</option>
                        <option value="0.5">0.5x</option>
                        <option value="1.0" selected>1.0x (通常)</option>
                        <option value="2.0">2.0x</option>
                    </select>
                </div>
                <button id="sim-sync-btn" style="width:100%; padding: 6px; background: var(--bg-card); color: var(--text-hi); border: 1px solid var(--border-hi); border-radius: 4px; cursor: pointer;">
                    地図に連動させる
                </button>
            </div>
            <div class="sim-row" style="margin-top: 15px; border-top: 1px solid var(--border); padding-top: 10px;">
                <div class="sec-label">記録データ再生</div>
                <div style="display: flex; gap: 4px; margin-top: 8px;">
                    <select id="record-select" style="flex: 1; background: var(--bg-card); color: var(--text-hi); border: 1px solid var(--border-hi); border-radius: 4px; padding: 4px; font-size: 11px;">
                        <option value="">記録を選択...</option>
                    </select>
                    <button onclick="refreshRecordList()" title="更新" style="padding: 4px 8px; background: var(--bg-card); color: var(--text-sub); border: 1px solid var(--border-hi); border-radius: 4px; cursor: pointer;">
                        <i class="fa-solid fa-rotate"></i>
                    </button>
                </div>
                <div style="display: flex; gap: 8px; margin-top: 8px;">
                    <button id="record-play-btn" onclick="toggleRecordPlayback()" style="flex:1; padding: 6px; background: var(--bg-card); color: var(--accent); border: 1px solid var(--accent); border-radius: 4px; cursor: pointer; font-size: 11px;">
                        <i class="fa-solid fa-play" style="margin-right: 4px;"></i>再生
                    </button>
                </div>
            </div>
        </div>
        <div class="panel-section" style="margin-top:auto">
            <div class="sec-label">シミュレーション最大震度</div>
            <div class="intensity-row">
                <div class="int-badge int-none" id="sim-max-int-badge">−</div>
                <div>
                    <div class="int-value" id="sim-max-int-value">計測値  −−</div>
                    <div class="int-point" id="sim-max-int-point">−−</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 地震情報 -->
    <div class="panel" id="panel-eqinfo">
        <div class="panel-header">地震情報</div>
        <div id="eqinfo-list">
            <div class="panel-empty">
                <i class="fa-solid fa-circle-notch fa-spin"></i>
                <span>読み込み中</span>
            </div>
        </div>
    </div>

    <!-- 津波情報 -->
    <div class="panel" id="panel-tsunami">
        <div class="panel-header">津波情報</div>
        <div class="panel-empty">
            <i class="fa-solid fa-water"></i>
            <span>津波情報なし</span>
        </div>
    </div>

    <!-- 設定 -->
    <div class="panel" id="panel-settings">
        <div class="panel-header">設定</div>
        <div class="panel-section">
            <div class="sec-label">接続状態</div>
            <div class="status-row">
                <span class="dot dot-off" id="kmoni-dot"></span>
                <span id="kmoni-status">強震モニタ: 未接続</span>
            </div>
        </div>

        <div class="panel-section" style="margin-top: 10px; border-top: 1px solid var(--border); padding-top: 15px;">
            <div class="sec-label">デバッグ / テスト</div>
            <div style="display: flex; gap: 8px; margin-top: 8px;">
                <button onclick="triggerTestEew()" style="flex:1; padding: 6px; background: var(--bg-card); color: var(--accent); border: 1px solid var(--accent); border-radius: 4px; cursor: pointer; font-size: 11px;">
                    緊急地震速報 表示テスト
                </button>
            </div>
            <div id="recorder-status" style="font-size: 10px; color: var(--text-dim); margin-top: 8px; text-align: center; border: 1px dashed var(--border); padding: 4px; border-radius: 4px;">
                <i class="fa-solid fa-circle" id="recorder-dot" style="color: var(--text-dim); font-size: 8px; margin-right: 4px;"></i>
                自動記録: 待機中
            </div>
            <div style="display: flex; gap: 8px; margin-top: 8px;">
                <button id="manual-record-btn" onclick="toggleManualRecord()" style="flex:1; padding: 6px; background: var(--bg-card); color: #fff; border: 1px solid var(--border-hi); border-radius: 4px; cursor: pointer; font-size: 11px;">
                    <i class="fa-solid fa-record-vinyl" style="margin-right: 4px;"></i>手動記録開始
                </button>
            </div>
        </div>
    </div>

</div>

<!-- 地図 -->
<div id="map">
    <div id="map-clock">
        <div id="map-clock-date">----/--/-- (−)</div>
        <div id="map-clock-time">--:--:--</div>
    </div>
    <div id="map-br">
        <div id="int-scale">
            <div id="int-scale-bar"></div>
            <div id="int-scale-labels">
                <span>7</span>
                <span>6</span>
                <span>5</span>
                <span>4</span>
                <span>3</span>
                <span>2</span>
                <span>1</span>
                <span>0</span>
                <span>-1</span>
                <span>-2</span>
                <span>-3</span>
            </div>
        </div>
        <button id="home-btn" title="ホームに戻る">
            <i class="fa-solid fa-house"></i>
        </button>
    </div>
</div>

<canvas id="kmoni-canvas" width="352" height="400" style="display:none"></canvas>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<script src="js/map.js"></script>
<script src="js/ui.js"></script>
<script src="js/kmoni.js"></script>
<script src="js/eqinfo.js"></script>
<script src="js/eew.js"></script>
<script src="js/recorder.js"></script>
<script src="js/player.js"></script>
</body>
</html>
